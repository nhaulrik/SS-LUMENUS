<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solon Slide Studio</title>
  <link rel="stylesheet" href="editor.css" />
  <style>
    body { background: #071913; color: #E4F7EE; margin: 0; font-family: Inter, Calibri, sans-serif; }
    .app-shell { max-width: 1400px; margin: 0 auto; padding: 24px; }
    header { margin-bottom: 24px; }
    header h1 { margin: 0 0 8px; font-size: 2rem; }
    header p { margin: 0; color: #B6D9C9; max-width: 820px; }
    .grid-2 { display: grid; grid-template-columns: 360px 1fr; gap: 20px; margin-bottom: 20px; }
    .panel { background: #0C2220; border: 1px solid #143A34; border-radius: 14px; padding: 18px; box-shadow: 0 18px 40px rgba(0,0,0,.2); }
    .panel h2 { margin-top: 0; font-size: 1.05rem; }
    .panel-small { padding: 14px; font-size: 0.95rem; color: #B6D9C9; }
    .template-list { display: grid; gap: 10px; max-height: 520px; overflow-y: auto; margin-top: 12px; }
    .template-item { width: 100%; text-align: left; padding: 12px 14px; border: 1px solid #144C43; border-radius: 10px; background: #0A2B28; color: #E4F7EE; cursor: pointer; transition: border-color .16s, transform .16s; }
    .template-item.active { border-color: #FF6359; transform: translateX(2px); }
    .template-item:hover { border-color: #73AA87; }
    textarea { width: 100%; min-height: 360px; background: #071913; border: 1px solid #144C43; border-radius: 12px; color: #E4F7EE; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size: 13px; padding: 14px; resize: vertical; }
    .controls { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
    .controls > * { flex: 1 1 auto; min-width: 160px; }
    .controls button, .controls select { width: 100%; min-height: 44px; border: none; border-radius: 10px; background: #1A4D44; color: #E4F7EE; font-size: 13px; cursor: pointer; }
    .controls button.primary { background: #FF6359; }
    .controls button.secondary { background: #1B5E52; }
    .status { border-radius: 10px; padding: 12px 14px; margin-top: 8px; font-size: 0.98rem; }
    .status.success { background: rgba(115, 170, 135, 0.16); color: #A2E7C0; border: 1px solid #4F7B6B; }
    .status.error { background: rgba(255, 99, 89, 0.12); color: #FFB0A3; border: 1px solid #C14A31; }
    .status.warning { background: rgba(255, 187, 85, 0.12); color: #FFD79A; border: 1px solid #B37C47; }
    .preview-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .preview-card { border: 1px solid #144C43; border-radius: 14px; background: #0B2822; padding: 16px; min-height: 440px; position: relative; }
    .preview-card canvas, .slide-canvas { border: 1px solid #144C43; border-radius: 12px; background: white; }
    .slide-canvas { width: 100%; max-width: 960px; height: 540px; margin: 0 auto; position: relative; overflow: hidden; }
    .canvas-label { position: absolute; top: 12px; left: 16px; right: 16px; color: #1B5E52; font-weight: 700; font-size: 0.95rem; }
    .template-stage { position: relative; width: 100%; height: 380px; background: #0A2B28; border-radius: 12px; overflow: hidden; }
    .page-carousel { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 8px; }
    .page-carousel { flex-wrap: nowrap; scroll-snap-type: x mandatory; }
    .carousel-item { min-width: 130px; padding: 10px 12px; border-radius: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: #E4F7EE; cursor: pointer; transition: transform .16s, border-color .16s, background .16s; }
    .carousel-item { scroll-snap-align: center; }
    .carousel-item:hover { transform: translateY(-1px); border-color: #73AA87; }
    .carousel-item.active { background: linear-gradient(135deg, rgba(255,99,89,0.18), rgba(115,170,135,0.2)); border-color: #FF6359; box-shadow: 0 10px 25px rgba(0,0,0,0.12); }
    .carousel-item span { display: block; font-size: 0.85rem; margin-top: 6px; color: #B6D9C9; }
    .slide-element { position: absolute; box-sizing: border-box; }
    .slide-element table { width: 100%; border-collapse: collapse; font-size: 11px; color: #141E1E; }
    .slide-element th, .slide-element td { border: 1px solid rgba(0,0,0,0.12); padding: 4px; }
    .template-box { position: absolute; border: 1px dashed rgba(255,255,255,0.28); border-radius: 6px; padding: 4px 6px; font-size: 11px; color: #E4F7EE; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .template-box.active { border-style: solid; border-color: #FF6359; }
    .template-stage .preview-grid { position: absolute; inset: 0; opacity: 0.14; background-size: 40px 40px; background-image: linear-gradient(to right, rgba(255,255,255,0.08) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.08) 1px, transparent 1px); }
    .download-link { color: #FFD282; text-decoration: underline; }
    @media (max-width: 1080px) { .grid-2, .preview-panels { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>Solon Slide Studio</h1>
      <p>Browse templates, paste slide JSON, validate content, preview a slide and generate PowerPoint directly from the browser.</p>
    </header>

    <div class="grid-2">
      <section class="panel">
        <h2>Slide templates</h2>
        <div id="template-list" class="template-list"></div>
        <div id="template-meta" class="panel-small"></div>
      </section>

      <section class="panel">
        <h2>Input JSON</h2>
        <div class="controls">
          <button id="load-sample" class="secondary">Load sample data</button>
          <button id="validate-btn" class="secondary">Validate JSON</button>
          <button id="preview-btn" class="primary">Preview slide</button>
        </div>
        <textarea id="json-input" spellcheck="false"></textarea>
        <div id="input-status" class="status success">Paste or load input JSON, then choose a template.</div>
      </section>
    </div>

    <div class="preview-panels">
      <section class="preview-card">
        <div class="canvas-label">Template layout preview</div>
        <div class="template-stage" id="template-preview">
          <div class="preview-grid"></div>
        </div>
      </section>
      <section class="preview-card">
        <div class="canvas-label">Slide preview</div>
        <div class="slide-canvas" id="slide-canvas"></div>
        <div class="controls" style="margin-top: 12px;">
          <div id="page-info" style="color: #B6D9C9; font-size: 0.95rem; margin-bottom: 10px;">Page 1 / 1</div>
          <div id="page-carousel" class="page-carousel"></div>
          <div style="display: grid; gap: 10px; width: 100%;">
            <label style="font-size: 0.9rem; color: #B6D9C9;">Template sample</label>
            <select id="sample-select" style="width: 100%; min-height: 44px; border-radius: 10px; border: 1px solid #144C43; background: #0A2B28; color: #E4F7EE; padding: 0 12px;"></select>
          </div>
          <button id="generate-btn" class="primary">Generate PPTX</button>
        </div>
        <div id="generate-status" class="status"></div>
      </section>
    </div>
  </div>

  <script>
    const theme = {
      colors: {
        darkTeal: '#123836',
        deepGreen: '#0A2422',
        medTeal: '#1B5E52',
        lightTeal: '#73AA87',
        coral: '#FF6359',
        gold: '#FFD282',
        slate: '#718886',
        bgGrey: '#D0D7D7',
        white: '#FFFFFF',
        nearBlack: '#141E1E',
        textGrey: '#4A5C5A',
        lightBg: '#EEF3F2'
      },
      fonts: { heading: 'Calibri', body: 'Calibri' }
    };

    let templates = {};
    let sampleInput = null;
    let allSlides = [];
    let selectedTemplate = null;
    let selectedSampleIndex = 0;
    let selectedPageIndex = 0;

    document.addEventListener('DOMContentLoaded', init);

    function init() {
      document.getElementById('load-sample').addEventListener('click', loadSampleData);
      document.getElementById('validate-btn').addEventListener('click', validateInput);
      document.getElementById('preview-btn').addEventListener('click', handlePreview);
      document.getElementById('generate-btn').addEventListener('click', generatePptx);
      document.getElementById('sample-select').addEventListener('change', event => {
        selectedSampleIndex = Number(event.target.value);
        const inputData = parseJsonInput();
        if (inputData) {
          const matchingSlides = allSlides.filter(slide => slide.slide_type === selectedTemplate);
          const selectedSlide = matchingSlides[selectedSampleIndex];
          if (selectedSlide) {
            selectedPageIndex = allSlides.findIndex(slide => slide === selectedSlide);
          }
        }
        showSelectedPage();
      });
      document.addEventListener('keydown', handleKeyboardNavigation);
      loadData();
    }

    async function loadData() {
      setInputStatus('Loading templates and sample data...', 'success');
      try {
        const [templatesRes, inputRes] = await Promise.all([
          fetch('/api/templates'),
          fetch('/api/input')
        ]);
        if (!templatesRes.ok) throw new Error('Failed to load templates');
        if (!inputRes.ok) throw new Error('Failed to load input sample');
        const templatesData = await templatesRes.json();
        sampleInput = await inputRes.json();
        allSlides = sampleInput.slide_recipe?.slides || sampleInput.slides || [];
        templates = templatesData.templates || {};
        document.getElementById('json-input').value = JSON.stringify(sampleInput, null, 2);
        renderTemplateList();
        selectFirstTemplate();
        populatePageOptions();
        populateSampleOptions();
        setInputStatus('Sample data loaded. Edit JSON and preview slides.', 'success');
      } catch (error) {
        setInputStatus(`Failed to load data: ${error.message}`, 'error');
      }
    }

    function loadSampleData() {
      if (!sampleInput) return;
      document.getElementById('json-input').value = JSON.stringify(sampleInput, null, 2);
      setInputStatus('Sample JSON loaded. Validate and preview or generate.', 'success');
      populateSampleOptions();
      populatePageOptions();
      renderSlidePreview();
    }

    function renderTemplateList() {
      const list = document.getElementById('template-list');
      list.innerHTML = '';
      Object.keys(templates).forEach(key => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'template-item' + (selectedTemplate === key ? ' active' : '');
        button.textContent = key;
        button.addEventListener('click', () => selectTemplate(key));
        list.appendChild(button);
      });
    }

    function selectFirstTemplate() {
      const keys = Object.keys(templates);
      if (keys.length === 0) return;
      selectedTemplate = selectedTemplate || keys[0];
      const firstMatch = allSlides.findIndex(slide => slide.slide_type === selectedTemplate);
      if (firstMatch !== -1) selectedPageIndex = firstMatch;
      renderTemplateList();
      renderTemplateMeta();
      renderTemplatePreview();
      renderSlidePreview();
      populateSampleOptions();
    }

    function selectTemplate(key) {
      selectedTemplate = key;
      selectedSampleIndex = 0;
      const firstMatch = allSlides.findIndex(slide => slide.slide_type === key);
      if (firstMatch !== -1) selectedPageIndex = firstMatch;
      renderTemplateList();
      renderTemplateMeta();
      renderTemplatePreview();
      renderSlidePreview();
      populateSampleOptions();
      populatePageOptions();
    }

    function renderTemplateMeta() {
      const meta = document.getElementById('template-meta');
      if (!selectedTemplate) {
        meta.textContent = 'Select a template to inspect layout, inputs and validation requirements.';
        return;
      }
      const template = templates[selectedTemplate];
      const componentCount = (template.components || []).length;
      meta.innerHTML = `Selected template: <strong>${selectedTemplate}</strong><br>${componentCount} components in layout.`;
    }

    function populateSampleOptions() {
      const select = document.getElementById('sample-select');
      select.innerHTML = '';
      const input = parseJsonInput();
      if (!input) return;
      const slides = input.slide_recipe?.slides || input.slides || [];
      const matching = slides.filter(slide => slide.slide_type === selectedTemplate);
      if (!matching.length) {
        select.innerHTML = '<option value="0">No matching slides</option>';
        return;
      }
      setPageInfo();
      matching.forEach((slide, idx) => {
        const opt = document.createElement('option');
        opt.value = idx;
        opt.textContent = slide.title || slide.header_title || `${selectedTemplate} sample ${idx + 1}`;
        select.appendChild(opt);
      });
      selectedSampleIndex = 0;
      select.value = 0;
    }

    function populatePageOptions() {
      if (!Array.isArray(allSlides) || allSlides.length === 0) {
        selectedPageIndex = 0;
        renderPageCarousel();
        setPageInfo();
        return;
      }
      if (selectedPageIndex < 0 || selectedPageIndex >= allSlides.length) {
        selectedPageIndex = 0;
      }
      renderPageCarousel();
      setPageInfo();
    }

    function renderPageCarousel() {
      const carousel = document.getElementById('page-carousel');
      if (!carousel) return;
      carousel.innerHTML = '';
      if (!Array.isArray(allSlides) || allSlides.length === 0) {
        carousel.textContent = 'No pages available';
        return;
      }
      allSlides.forEach((slide, idx) => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = 'carousel-item' + (idx === selectedPageIndex ? ' active' : '');
        item.innerHTML = `<strong>Page ${idx + 1}</strong><span>${slide.title || slide.header_title || slide.subtitle || slide.slide_type}</span>`;
        item.addEventListener('click', () => {
          selectedPageIndex = idx;
          showSelectedPage();
        });
        carousel.appendChild(item);
      });
      const activeNode = carousel.querySelector('.carousel-item.active');
      if (activeNode) {
        activeNode.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
      }
    }

    function setPageInfo() {
      const info = document.getElementById('page-info');
      if (!info) return;
      if (!Array.isArray(allSlides) || allSlides.length === 0) {
        info.textContent = 'No slides available';
        return;
      }
      if (selectedPageIndex < 0 || selectedPageIndex >= allSlides.length) {
        selectedPageIndex = 0;
      }
      const slide = allSlides[selectedPageIndex] || {};
      const title = slide.title || slide.header_title || slide.subtitle || slide.slide_type || 'Untitled';
      info.textContent = `Page ${selectedPageIndex + 1} / ${allSlides.length}: ${title}`;
    }

    function showSelectedPage() {
      const slideData = allSlides[selectedPageIndex];
      if (!slideData) return;
      selectedTemplate = slideData.slide_type;
      renderTemplateList();
      renderTemplateMeta();
      renderTemplatePreview();
      populatePageOptions();
      populateSampleOptions();
      renderSlidePreview();
    }

    function handleKeyboardNavigation(event) {
      if (event.key !== 'ArrowLeft' && event.key !== 'ArrowRight') return;
      const activeTag = document.activeElement?.tagName;
      if (['INPUT', 'TEXTAREA', 'SELECT', 'BUTTON'].includes(activeTag)) return;
      if (!Array.isArray(allSlides) || !allSlides.length) return;
      if (event.key === 'ArrowLeft') {
        selectedPageIndex = Math.max(0, selectedPageIndex - 1);
      } else {
        selectedPageIndex = Math.min(allSlides.length - 1, selectedPageIndex + 1);
      }
      showSelectedPage();
      event.preventDefault();
    }

    function parseJsonInput() {
      const raw = document.getElementById('json-input').value.trim();
      if (!raw) return null;
      try {
        return JSON.parse(raw);
      } catch (err) {
        setInputStatus(`JSON parse error: ${err.message}`, 'error');
        return null;
      }
    }

    async function validateInput() {
      const inputData = parseJsonInput();
      if (!inputData) return;
      if (!selectedTemplate) {
        setInputStatus('Select a template before validating.', 'error');
        return;
      }
      try {
        const response = await fetch('/api/validate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ inputData, selectedTemplate })
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || 'Validation failed.');
        const status = result.valid ? 'success' : 'error';
        const messages = [...result.errors, ...result.warnings].map(msg => `• ${msg}`).join('\n');
        setInputStatus(result.valid ? 'Validation passed.' : 'Validation found issues.', status, messages);
        return result;
      } catch (err) {
        setInputStatus(err.message, 'error');
      }
    }

    function getSlideCandidates(inputData) {
      const slides = inputData.slide_recipe?.slides || inputData.slides || [];
      return slides.filter(slide => slide.slide_type === selectedTemplate);
    }

    function getSelectedSlide(inputData) {
      const candidates = getSlideCandidates(inputData);
      return candidates[selectedSampleIndex] || candidates[0];
    }

    function handlePreview() {
      const inputData = parseJsonInput();
      if (!inputData) return;
      if (!selectedTemplate) {
        setInputStatus('Select a template to preview.', 'error');
        return;
      }
      const candidates = getSlideCandidates(inputData);
      if (!candidates.length) {
        setInputStatus(`No slides found for template '${selectedTemplate}'.`, 'error');
        return;
      }
      if (selectedSampleIndex >= candidates.length) selectedSampleIndex = 0;
      populateSampleOptions();
      renderSlidePreview();
      setInputStatus('Slide preview rendered. Use Generate to export PPTX.', 'success');
    }

    function clearCanvas() {
      const canvas = document.getElementById('slide-canvas');
      canvas.innerHTML = '';
    }

    function renderTemplatePreview() {
      const preview = document.getElementById('template-preview');
      preview.innerHTML = '<div class="preview-grid"></div>';
      const template = templates[selectedTemplate];
      if (!template) return;
      template.components?.forEach((component, index) => {
        const dimensions = getComponentPreviewBounds(component);
        if (!dimensions) return;
        const card = document.createElement('div');
        card.className = 'template-box';
        card.style.left = `${dimensions.left}%`;
        card.style.top = `${dimensions.top}%`;
        card.style.width = `${dimensions.width}%`;
        card.style.height = `${dimensions.height}%`;
        card.textContent = `${component.type}`;
        if (component.type === 'header') card.classList.add('active');
        preview.appendChild(card);
      });
    }

    function getComponentPreviewBounds(component) {
      if (typeof component.x === 'number' && typeof component.y === 'number' && typeof component.w === 'number' && typeof component.h === 'number') {
        return {
          left: Math.max(0, Math.min(100, (component.x / 10) * 100)),
          top: Math.max(0, Math.min(100, (component.y / 5.625) * 100)),
          width: Math.max(5, Math.min(100, (component.w / 10) * 100)),
          height: Math.max(5, Math.min(100, (component.h / 5.625) * 100))
        };
      }
      if (component.type === 'header') {
        return { left: 2, top: 2, width: 96, height: 18 };
      }
      if (component.type === 'agenda_grid') {
        return { left: 2, top: 18, width: 96, height: 60 };
      }
      if (component.type === 'kpi_row') {
        return { left: 2, top: 18, width: 96, height: 18 };
      }
      return null;
    }

    function renderSlidePreview() {
      const canvas = document.getElementById('slide-canvas');
      canvas.innerHTML = '';
      const inputData = parseJsonInput();
      if (!inputData) return;
      const slideData = allSlides[selectedPageIndex] || getSelectedSlide(inputData);
      if (!slideData) return;
      const template = templates[selectedTemplate] || templates[slideData.slide_type];
      if (!template) return;
      canvas.style.backgroundColor = template.background ? (theme.colors[template.background] || template.background) : theme.colors.lightBg;
      template.components?.forEach(component => {
        renderPreviewComponent(canvas, component, slideData);
      });
      if (template.footer) {
        const footer = document.createElement('div');
        footer.style.position = 'absolute';
        footer.style.left = '0';
        footer.style.bottom = '0';
        footer.style.width = '100%';
        footer.style.height = '6.8%';
        footer.style.backgroundColor = theme.colors.darkTeal;
        canvas.appendChild(footer);
      }
    }

    function renderPreviewComponent(canvas, component, slideData) {
      if (component.type === 'header') {
        const header = document.createElement('div');
        header.className = 'slide-element';
        header.style.position = 'absolute';
        header.style.left = '2.5%';
        header.style.top = '3.5%';
        header.style.width = '95%';
        header.style.height = '12%';
        header.style.padding = '8px';
        header.style.backgroundColor = 'rgba(255,255,255,0.12)';
        header.style.color = theme.colors.nearBlack;
        header.style.fontSize = '12px';
        header.style.fontWeight = '700';
        header.style.display = 'flex';
        header.style.flexDirection = 'column';
        const title = document.createElement('div');
        title.textContent = getField(slideData, component.bind?.title) || component.title || 'Header title';
        const subtitle = document.createElement('div');
        subtitle.textContent = getField(slideData, component.bind?.subtitle) || component.subtitle || 'Header subtitle';
        subtitle.style.fontSize = '10px';
        subtitle.style.marginTop = '4px';
        header.appendChild(title);
        header.appendChild(subtitle);
        canvas.appendChild(header);
        return;
      }
      if (component.type === 'kpi_row') {
        const items = getField(slideData, component.bind) || [];
        items.forEach((item, idx) => {
          const card = document.createElement('div');
          card.className = 'slide-element';
          card.style.position = 'absolute';
          card.style.left = `${((component.x || 0) + idx * ((component.cardWidth || 2.2) + (component.gap || 0.19))) / 10 * 100}%`;
          card.style.top = `${(component.y || 1.1) / 5.625 * 100}%`;
          card.style.width = `${((component.cardWidth || 2.2) / 10) * 100}%`;
          card.style.height = `${((component.cardHeight || 1.05) / 5.625) * 100}%`;
          card.style.backgroundColor = theme.colors.darkTeal;
          card.style.border = `1px solid ${theme.colors.medTeal}`;
          card.style.padding = '6px';
          card.style.color = theme.colors.white;
          card.style.fontSize = '10px';
          card.innerHTML = `<div style="font-weight:700; font-size:13px;">${item.value || ''}</div><div style="margin-top:4px; font-size:9px;">${item.label || ''}</div>`;
          canvas.appendChild(card);
        });
        return;
      }
      if (component.type === 'agenda_grid') {
        const items = getField(slideData, component.bind) || [];
        items.slice(0, 6).forEach((item, idx) => {
          const cols = component.columns || 2;
          const col = idx % cols;
          const row = Math.floor(idx / cols);
          const card = document.createElement('div');
          card.className = 'slide-element';
          card.style.position = 'absolute';
          card.style.left = `${((component.x || 0) + col * ((component.cardWidth || 4.7) + (component.horizontalGap || 0.6))) / 10 * 100}%`;
          card.style.top = `${((component.y || 1.15) + row * (component.rowHeight || 1.35)) / 5.625 * 100}%`;
          card.style.width = `${((component.cardWidth || 4.7) / 10) * 100}%`;
          card.style.height = `${((component.cardHeight || 1.2) / 5.625) * 100}%`;
          card.style.backgroundColor = theme.colors.white;
          card.style.border = `1px solid ${theme.colors.medTeal}`;
          card.style.padding = '6px';
          card.style.color = theme.colors.nearBlack;
          card.style.fontSize = '10px';
          card.innerHTML = `<strong>${item.num || ''} ${item.title || ''}</strong><div style="margin-top:4px; font-size:9px;">${item.sub || ''}</div>`;
          canvas.appendChild(card);
        });
        return;
      }
      const hasBox = typeof component.x === 'number' && typeof component.y === 'number' && typeof component.w === 'number' && typeof component.h === 'number';
      if (!hasBox) {
        return;
      }
      const el = document.createElement('div');
      el.className = 'slide-element';
      el.style.position = 'absolute';
      el.style.left = `${(component.x / 10) * 100}%`;
      el.style.top = `${(component.y / 5.625) * 100}%`;
      el.style.width = `${(component.w / 10) * 100}%`;
      el.style.height = `${(component.h / 5.625) * 100}%`;
      if (component.type === 'shape') {
        el.style.backgroundColor = theme.colors[component.fill] || component.fill || 'transparent';
        if (component.line) {
          el.style.border = `1px solid ${theme.colors[component.line.color] || component.line.color || '#000'}`;
        }
      } else {
        el.style.padding = '6px';
        el.style.overflow = 'hidden';
        el.style.whiteSpace = 'pre-wrap';
        el.style.wordBreak = 'break-word';
        el.style.color = theme.colors[component.color] || component.color || theme.colors.nearBlack;
        el.style.fontSize = `${component.fontSize || 10}px`;
        el.style.fontFamily = component.font || 'Calibri';
        if (component.type === 'text') {
          el.textContent = (component.staticText !== undefined && component.staticText !== null) ? component.staticText : (getField(slideData, component.bind) || '');
        } else if (component.type === 'bullet_list') {
          const list = getField(slideData, component.bind) || [];
          el.innerHTML = list.map(item => `• ${item}`).join('<br>');
        } else if (component.type === 'table') {
          const tableData = getField(slideData, component.bind) || { rows: [] };
          const rows = tableData.rows || [];
          const header = component.columns?.map(col => `<th>${col.label}</th>`).join('') || '';
          const body = rows.map(row => `<tr>${component.columns?.map(col => `<td>${getField(row, col.key) ?? ''}</td>`).join('')}</tr>`).join('');
          el.innerHTML = `<table class="slide-table"><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`;
          el.style.padding = '0';
        } else {
          el.textContent = component.type;
        }
      }
      canvas.appendChild(el);
    }

    async function generatePptx() {
      const inputData = parseJsonInput();
      if (!inputData) return;
      if (!selectedTemplate) {
        setGenerateStatus('You must select a template before generating.', 'error');
        return;
      }
      setGenerateStatus('Generating PPTX…', 'success');
      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ inputData, selectedTemplate })
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || 'Generation failed');
        setGenerateResult(result.downloadUrl, result.fileName || 'Download PPTX');
      } catch (err) {
        setGenerateStatus(err.message, 'error');
      }
    }

    function setInputStatus(message, type = 'success', details = '', extraNode = null) {
      const status = document.getElementById('input-status');
      status.textContent = message;
      status.className = `status ${type}`;
      if (details) {
        status.innerHTML = `${message}<br><small>${details}</small>`;
      }
      if (extraNode) {
        status.appendChild(document.createTextNode(' '));
        status.appendChild(extraNode);
      }
    }

    function setGenerateStatus(message, type = 'success', details = '', extraNode = null) {
      const status = document.getElementById('generate-status');
      status.textContent = message;
      status.className = `status ${type}`;
      if (details) {
        status.innerHTML = `${message}<br><small>${details}</small>`;
      }
      if (extraNode) {
        status.appendChild(document.createTextNode(' '));
        status.appendChild(extraNode);
      }
    }

    function setGenerateResult(downloadUrl, fileName) {
      const status = document.getElementById('generate-status');
      status.innerHTML = `Presentation generated successfully. <a href="${downloadUrl}" target="_blank" class="download-link">Download ${fileName}</a>`;
      status.className = 'status success';
    }

    function getField(data, path) {
      if (!path || !data) return undefined;
      return path.split('.').reduce((obj, key) => (obj && obj[key] !== undefined ? obj[key] : undefined), data);
    }
  </script>
</body>
</html>
